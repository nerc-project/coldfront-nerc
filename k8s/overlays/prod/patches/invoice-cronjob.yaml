apiVersion: batch/v1
kind: CronJob
metadata:
  name: invoice-cronjob
spec:
  schedule: "0 13 1 * 0" # TODO Is this the correct schedule?
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: invoice-cronjob
            image: ghcr.io/nerc-project/coldfront-nerc:v0.3.11
            imagePullPolicy: Always
            command: ['coldfront']
            args: ['calculate_storage_gb_hours', '--upload-to-s3']
            env:
              - name: DATABASE_HOST
                valueFrom:
                  secretKeyRef:
                    name: coldfront-postgres-ha-pguser-coldfront-postgres-ha
                    key: host
              - name: DATABASE_PORT
                valueFrom:
                  secretKeyRef:
                    name: coldfront-postgres-ha-pguser-coldfront-postgres-ha
                    key: port
              - name: DATABASE_NAME
                valueFrom:
                  secretKeyRef:
                    name: coldfront-postgres-ha-pguser-coldfront-postgres-ha
                    key: dbname
              - name: DATABASE_USER
                valueFrom:
                  secretKeyRef:
                    name: coldfront-postgres-ha-pguser-coldfront-postgres-ha
                    key: user
              - name: DATABASE_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: coldfront-postgres-ha-pguser-coldfront-postgres-ha
                    key: password
            envFrom:
              - configMapRef:
                  name: coldfront-configmap
          restartPolicy: OnFailure
